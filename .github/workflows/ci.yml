name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

jobs:
  conventional-commits:
    name: Conventional Commits
    if: github.event_name == 'pull_request' && !startsWith(github.head_ref, 'release-please--')
    runs-on: ubuntu-latest
    steps:
      - uses: amannn/action-semantic-pull-request@v5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          types: |
            feat
            fix
            docs
            style
            refactor
            perf
            test
            build
            ci
            chore
            revert
          scopes: |
            appdirs
            ci
            database
            diagnostics
            frontend
            keyring
            lifecycle
            settings
            state
            llm
            errors
            events
            logging
            shortcuts
            updates
          requireScope: false
          subjectPattern: ^.+$
          subjectPatternError: "The subject must not be empty."

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: jrschumacher/go-actions/ci@v3
        with:
          job: test

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: jrschumacher/go-actions/ci@v3
        with:
          job: lint

  typecheck:
    name: TypeScript
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm ci
        working-directory: frontend/types
      - run: npm ci
        working-directory: frontend/settings
      - run: npm install --save-dev typescript
        working-directory: frontend
      - run: npx tsc --noEmit
        working-directory: frontend

  security:
    name: Security
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: jrschumacher/go-actions/ci@v3
        with:
          job: security

  ts-typecheck:
    name: TypeScript Typecheck
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend/types
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/types/package-lock.json
      - run: npm ci
      - run: npm run typecheck

  ts-lint:
    name: TypeScript Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend/types
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/types/package-lock.json
      - run: npm ci
      - run: npm run lint

  settings-ts-typecheck:
    name: Settings TypeScript Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/settings/package-lock.json
      - run: npm ci
        working-directory: frontend/types
      - run: npm ci
        working-directory: frontend/settings
      - run: npm run typecheck
        working-directory: frontend/settings

  settings-ts-lint:
    name: Settings TypeScript Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/settings/package-lock.json
      - run: npm ci
        working-directory: frontend/types
      - run: npm ci
        working-directory: frontend/settings
      - run: npm run lint
        working-directory: frontend/settings

  settings-ts-test:
    name: Settings TypeScript Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/settings/package-lock.json
      - run: npm ci
        working-directory: frontend/types
      - run: npm ci
        working-directory: frontend/settings
      - run: npm run test
        working-directory: frontend/settings
