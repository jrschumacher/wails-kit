name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: jrschumacher/go-actions/release@v3
        with:
          release-token: ${{ secrets.RELEASE_PLEASE_PAT || github.token }}
          go-version-file: appdirs/go.mod
