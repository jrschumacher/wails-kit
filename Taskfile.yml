version: '3'

tasks:
  check:
    desc: Run all checks (same as CI)
    cmds:
      - task: lint
      - task: test
      - task: ts:check

  lint:
    desc: Run golangci-lint across all modules
    vars:
      MODULES:
        sh: go work edit -json | jq -r '.Use[].DiskPath'
    cmds:
      - for: { var: MODULES }
        cmd: golangci-lint run --path-prefix={{.ITEM}} {{.ITEM}}/...

  test:
    desc: Run all Go tests across all modules
    vars:
      MODULES:
        sh: go work edit -json | jq -r '.Use[].DiskPath'
    cmds:
      - for: { var: MODULES }
        cmd: cd {{.ITEM}} && go test ./...

  ts:check:
    desc: Run frontend TypeScript checks
    cmds:
      - task: ts:check:types
      - task: ts:check:settings

  ts:check:types:
    desc: Run frontend/types TypeScript typecheck and lint
    dir: frontend/types
    cmds:
      - npm ci --silent
      - npm run typecheck
      - npm run lint

  ts:check:settings:
    desc: Run frontend/settings typecheck, lint, and tests
    dir: frontend/settings
    cmds:
      - npm ci --silent
      - npm run typecheck
      - npm run lint
      - npm test
