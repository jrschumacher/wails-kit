version: '3'

tasks:
  check:
    desc: Run all checks (same as CI)
    cmds:
      - task: lint
      - task: test
      - task: ts:check

  lint:
    desc: Run golangci-lint
    cmds:
      - golangci-lint run ./...

  test:
    desc: Run all Go tests
    cmds:
      - go test ./...

  ts:check:
    desc: Run TypeScript typecheck and lint
    dir: frontend/types
    cmds:
      - npm ci --silent
      - npm run typecheck
      - npm run lint
